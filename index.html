<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 24px;
            width: 100%;
            max-width: 600px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
        }

        .api-section {
            padding: 20px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
        }

        .api-section input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .api-section button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
        }

        .messages {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: #f8fafc;
        }

        .message {
            margin-bottom: 16px;
            display: flex;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
        }

        .user .message-bubble {
            background: #667eea;
            color: white;
            border-radius: 18px 4px 18px 18px;
        }

        .ai .message-bubble {
            background: white;
            color: #1e293b;
            border-radius: 4px 18px 18px 18px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .input-area {
            padding: 20px;
            background: white;
            display: flex;
            gap: 10px;
            border-top: 1px solid #e2e8f0;
        }

        .input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 24px;
            font-size: 14px;
        }

        .input-area button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
        }

        .input-area button:disabled {
            opacity: 0.6;
        }

        .error {
            color: #ef4444;
            text-align: center;
            padding: 10px;
            font-size: 12px;
        }

        .thinking {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #e2e8f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 AI Chat</h1>
        </div>

        <div id="apiSection" class="api-section">
            <input type="text" id="apiKeyInput" placeholder="Enter your API key (sk_...)" autocomplete="off">
            <button onclick="saveAndStart()">Start Chatting</button>
            <div id="apiError" class="error"></div>
        </div>

        <div id="chatSection" style="display: none;">
            <div class="messages" id="messages">
                <div class="message ai">
                    <div class="message-bubble">
                        Hello! I'm your AI assistant. Ask me anything!
                    </div>
                </div>
            </div>

            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Type your message..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button id="sendBtn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        const API_PORT = 8888;
        let API_KEY = localStorage.getItem("my_api_key");
        
        if (API_KEY) {
            document.getElementById("apiSection").style.display = "none";
            document.getElementById("chatSection").style.display = "block";
        }

        async function saveAndStart() {
            const key = document.getElementById("apiKeyInput").value.trim();
            if (!key) {
                document.getElementById("apiError").innerText = "Please enter your API key";
                return;
            }
            
            document.getElementById("apiError").innerHTML = '<div class="thinking"></div> Testing connection...';
            
            try {
                const response = await fetch(`http://127.0.0.1:${API_PORT}/health`, {
                    headers: { "x-api-key": key }
                });
                
                if (response.ok) {
                    API_KEY = key;
                    localStorage.setItem("my_api_key", key);
                    document.getElementById("apiSection").style.display = "none";
                    document.getElementById("chatSection").style.display = "block";
                } else {
                    document.getElementById("apiError").innerHTML = "Invalid API key. Make sure your server is running.";
                }
            } catch (error) {
                document.getElementById("apiError").innerHTML = `Cannot connect to server on port ${API_PORT}. Make sure your server is running.`;
            }
        }

        async function sendMessage() {
            const input = document.getElementById("messageInput");
            const message = input.value.trim();
            if (!message) return;
            
            addMessage(message, "user");
            input.value = "";
            
            const sendBtn = document.getElementById("sendBtn");
            sendBtn.disabled = true;
            showTyping();
            
            try {
                const response = await fetch(`http://127.0.0.1:${API_PORT}/v1/chat`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "x-api-key": API_KEY
                    },
                    body: JSON.stringify({ prompt: message })
                });
                
                removeTyping();
                
                if (response.ok) {
                    const data = await response.json();
                    addMessage(data.response, "ai");
                } else {
                    addMessage("Error: " + response.status, "ai");
                }
            } catch (error) {
                removeTyping();
                addMessage(`Error: Cannot connect to server on port ${API_PORT}`, "ai");
            }
            
            sendBtn.disabled = false;
        }

        function addMessage(text, sender) {
            const messagesDiv = document.getElementById("messages");
            const messageDiv = document.createElement("div");
            messageDiv.className = `message ${sender}`;
            messageDiv.innerHTML = `<div class="message-bubble">${escapeHtml(text)}</div>`;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function showTyping() {
            const messagesDiv = document.getElementById("messages");
            const typingDiv = document.createElement("div");
            typingDiv.id = "typingIndicator";
            typingDiv.className = "message ai";
            typingDiv.innerHTML = `<div class="message-bubble"><span class="thinking"></span> Thinking...</div>`;
            messagesDiv.appendChild(typingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function removeTyping() {
            const typing = document.getElementById("typingIndicator");
            if (typing) typing.remove();
        }

        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
